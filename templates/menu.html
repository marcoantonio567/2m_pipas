<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2M Pipas - Menu</title>
    <style>
        :root {
            color-scheme: light;
            --background: #f4f7fb;
            --surface: #ffffff;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --text: #172033;
            --muted: #667085;
            --border: #d8e1ec;
            --shadow: 0 18px 45px rgba(23, 32, 51, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: var(--background);
        }

        .page {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 28px 22px;
            box-shadow: var(--shadow);
        }

        .brand {
            margin-bottom: 34px;
        }

        .brand strong {
            display: block;
            font-size: 24px;
            line-height: 1.1;
        }

        .brand span {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 14px;
        }

        .menu {
            display: grid;
            gap: 10px;
        }

        .menu a {
            display: block;
            padding: 14px 16px;
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            border: 1px solid transparent;
            transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
        }

        .menu a:hover,
        .menu a:focus {
            color: var(--primary-dark);
            background: #e7f6f4;
            border-color: #b8e1dc;
            outline: none;
        }

        .content {
            padding: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome {
            width: min(720px, 100%);
        }

        .welcome h1 {
            margin: 0 0 12px;
            font-size: 36px;
            line-height: 1.15;
        }

        .welcome p {
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.5;
        }

        @media (max-width: 760px) {
            .page {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: 0;
                border-bottom: 1px solid var(--border);
                box-shadow: none;
            }

            .content {
                padding: 28px 22px;
                justify-content: flex-start;
            }

            .welcome h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <aside class="sidebar" aria-label="Menu principal">
            <div class="brand">
                <strong>2M Pipas</strong>
                <span>Sistema de gestao</span>
            </div>

            <nav class="menu">
                <a href="{% url 'produtos' %}">Produtos</a>
                <a href="{% url 'clientes' %}">Clientes</a>
                <a href="{% url 'vendas' %}">Vendas</a>
                <a href="{% url 'financeiro_caixa' %}">Financeiro</a>
            </nav>
        </aside>

        <section class="content">
            <div class="welcome">
                <h1>Bem-vindo ao sistema</h1>
                <p>Escolha uma opcao no menu para acessar as areas de produtos, clientes, vendas e financeiro.</p>
            </div>
        </section>
    </main>
</body>
</html>
