{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2M Pipas - Excluir Categoria</title>
    <link rel="stylesheet" href="{% static 'financeiro/css/financeiro_categoria_confirm_delete.css' %}">
    <link rel="stylesheet" href="{% static 'shared/css/sidebar.css' %}">
</head>
<body>
    <main class="page">
        {% include 'shared/html/sidebar.html' %}

        <section class="content">
            <form class="confirm-panel" method="post">
                {% csrf_token %}
                <span class="warning-icon">!</span>
                <h1>Excluir categoria</h1>
                <p>Confirme para remover esta categoria financeira.</p>
                <div class="category-name">
                    <span>Categoria selecionada</span>
                    <strong>{{ category.name }}</strong>
                </div>

                <div class="actions">
                    <button class="button button-danger" type="submit">Excluir categoria</button>
                    <a class="button button-secondary" href="{% url 'financeiro_categorias' %}">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
