{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

    <link rel="stylesheet" href="{% static 'menu/css/menu.css' %}">
</head>
<body>

                <strong>2M Pipas</strong>
                <span>Sistema de gestao</span>
            </div>

            <nav class="menu">

        <section class="content">
