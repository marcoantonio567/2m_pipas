{% if rows %}
    <div class="bar-chart">
        {% for row in rows %}
            <div class="bar-column">
                <div class="bar-plot" aria-hidden="true">
                    <span class="bar-fill" style="height: {{ row.percent }}%;"></span>
                </div>
                <div class="bar-meta">
                    <strong>{{ row.label }}</strong>
                    <span>{{ row.total }} ocorrencias</span>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <div class="empty-chart">{{ empty_text }}</div>
{% endif %}
