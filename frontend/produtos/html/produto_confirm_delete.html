{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2M Pipas - Excluir Produto</title>
    <link rel="stylesheet" href="{% static 'produtos/css/produto_confirm_delete.css' %}">
    <link rel="stylesheet" href="{% static 'shared/css/sidebar.css' %}">
</head>
<body>
    <main class="page">
        {% include 'shared/html/sidebar.html' %}

        <section class="content">
            <form class="confirm-panel" method="post">
                {% csrf_token %}
                <span class="warning-icon">!</span>
                <h1>Excluir produto</h1>
                <p>Confirme para remover este produto do sistema. Esta acao nao altera vendas ja registradas.</p>
                <div class="product-name">
                    <span>Produto selecionado</span>
                    <strong>{{ product.name }}</strong>
                </div>

                <div class="actions">
                    <button class="button button-danger" type="submit">Excluir produto</button>
                    <a class="button button-secondary" href="{% url 'produtos' %}">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
