{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2M Pipas - Excluir Produto</title>
    <link rel="stylesheet" href="{% static 'produtos/css/produto_confirm_delete.css' %}">
</head>
<body>
    <main class="page">
        <aside class="sidebar" aria-label="Menu principal">
            <div class="brand">
                <strong>2M Pipas</strong>
                <span>Sistema de gestao</span>
            </div>

            <nav class="menu">
                <a href="{% url 'menu' %}"><span>I</span><strong>Inicio</strong></a>
                <a class="active" href="{% url 'produtos' %}"><span>P</span><strong>Produtos</strong></a>
                <a href="{% url 'clientes' %}"><span>C</span><strong>Clientes</strong></a>
                <a href="{% url 'vendas' %}"><span>V</span><strong>Vendas</strong></a>
                <a href="{% url 'financeiro_caixa' %}"><span>F</span><strong>Financeiro</strong></a>
            </nav>
        </aside>

        <section class="content">
            <form class="confirm-panel" method="post">
                {% csrf_token %}
                <span class="warning-icon">!</span>
                <h1>Excluir produto</h1>
                <p>Confirme para remover este produto do sistema. Esta acao nao altera vendas ja registradas.</p>
                <div class="product-name">
                    <span>Produto selecionado</span>
                    <strong>{{ product.name }}</strong>
                </div>

                <div class="actions">
                    <button class="button button-danger" type="submit">Excluir produto</button>
                    <a class="button button-secondary" href="{% url 'produtos' %}">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
