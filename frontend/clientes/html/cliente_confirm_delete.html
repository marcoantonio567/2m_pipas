{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2M Pipas - Excluir Cliente</title>
    <link rel="stylesheet" href="{% static 'clientes/css/cliente_confirm_delete.css' %}">
    <link rel="stylesheet" href="{% static 'shared/css/sidebar.css' %}">
</head>
<body>
    <main class="page">
        {% include 'shared/html/sidebar.html' %}

        <section class="content">
            <form class="confirm-panel" method="post">
                {% csrf_token %}
                <span class="warning-icon">!</span>
                <h1>Excluir cliente</h1>
                <p>Confirme para remover este cliente e o historico de vendas vinculado a ele.</p>
                <div class="client-name">
                    <span>Cliente selecionado</span>
                    <strong>{{ client.name }}</strong>
                </div>

                <div class="actions">
                    <button class="button button-danger" type="submit">Excluir cliente</button>
                    <a class="button button-secondary" href="{% url 'clientes' %}">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
