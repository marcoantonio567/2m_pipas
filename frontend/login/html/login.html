{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2M Pipas - Login</title>
    <link rel="stylesheet" href="{% static 'login/css/login.css' %}">
</head>
<body>
    <main class="container">
        <section class="form_area" aria-labelledby="login-title">
            <p class="title" id="login-title">LOGIN</p>

            {% if error %}
                <p class="error_message">{{ error }}</p>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="form_group">
                    <label class="sub_title" for="password">Senha</label>
                    <input
                        class="form_style"
                        id="password"
                        name="password"
                        type="password"
                        inputmode="numeric"
                        pattern="[0-9]+"
                        placeholder="Digite sua senha numerica"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button class="btn" type="submit">ENTRAR</button>
            </form>
        </section>
    </main>
</body>
</html>
